<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Ethics Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --nero: #1a1a1a;
    --oro: #B8922A;
    --oro-light: #D4AF6A;
    --panna: #FAF7F2;
    --rosso: #C0392B;
    --grigio: #6a6a6a;
    --grigio-light: #e8e4de;
    --verde: #2D7A4F;
    --bianco: #ffffff;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--panna);
    color: var(--nero);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--nero);
    padding: 40px 40px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: 'F';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 260px;
    color: rgba(184,146,42,0.08);
    line-height: 1;
    pointer-events: none;
  }
  .gold-line { width: 60px; height: 3px; background: var(--oro); margin-bottom: 16px; }
  .header-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--oro);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 4vw, 40px);
    color: var(--bianco);
    font-weight: 400;
    line-height: 1.2;
  }
  .header h1 span { color: var(--oro); font-style: italic; }
  .header-sub {
    font-size: 11px;
    color: #888;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  /* PROGRESS */
  .progress-wrap {
    background: var(--nero);
    padding: 0 40px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--oro);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
  }

  /* MAIN */
  .main { max-width: 780px; margin: 0 auto; padding: 40px 24px 60px; }

  /* QUESTION CARD */
  .question-card {
    background: var(--bianco);
    border-radius: 2px;
    padding: 36px 40px;
    margin-bottom: 20px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    display: none;
    animation: fadeSlide 0.4s ease forwards;
    position: relative;
  }
  .question-card.active { display: block; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .q-num {
    background: var(--nero);
    color: var(--oro);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }
  .q-type {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grigio);
    font-weight: 600;
    border: 1px solid var(--grigio-light);
    padding: 4px 10px;
  }
  .q-type.tf { border-color: var(--oro); color: var(--oro); }
  .q-type.mc { border-color: var(--nero); color: var(--nero); }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    line-height: 1.6;
    color: var(--nero);
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid var(--grigio-light);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    background: var(--panna);
    user-select: none;
  }
  .option:hover:not(.disabled) {
    border-color: var(--oro);
    background: #fdf9f0;
  }
  .option.selected {
    border-color: var(--oro);
    background: #fdf9f0;
  }
  .option.correct {
    border-color: var(--verde);
    background: #f0faf5;
  }
  .option.wrong {
    border-color: var(--rosso);
    background: #fdf0ef;
  }
  .option.disabled { cursor: default; pointer-events: none; }

  .opt-indicator {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--grigio-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: all 0.2s;
    font-family: 'Montserrat', sans-serif;
    color: var(--grigio);
  }
  .option.selected .opt-indicator { border-color: var(--oro); color: var(--oro); background: #fff8ec; }
  .option.correct .opt-indicator { border-color: var(--verde); color: var(--verde); background: #edfaf4; }
  .option.wrong .opt-indicator { border-color: var(--rosso); color: var(--rosso); background: #fdecea; }

  .opt-label {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--nero);
    flex: 1;
  }
  .opt-icon { font-size: 16px; flex-shrink: 0; }

  /* T/F special layout */
  .tf-options { flex-direction: row; gap: 14px; }
  .tf-options .option { flex: 1; justify-content: center; flex-direction: column; text-align: center; padding: 20px; gap: 8px; }
  .tf-options .opt-indicator { display: none; }
  .tf-icon { font-size: 28px; }
  .tf-label { font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

  /* FEEDBACK */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-left: 3px solid;
    font-size: 12.5px;
    line-height: 1.7;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct-fb { border-color: var(--verde); background: #f2fbf7; color: #1a5e38; }
  .feedback.wrong-fb { border-color: var(--rosso); background: #fdf2f1; color: #922b21; }
  .feedback strong { font-weight: 700; }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
  }
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 28px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-primary { background: var(--nero); color: var(--bianco); }
  .btn-primary:hover { background: var(--oro); }
  .btn-ghost { background: transparent; color: var(--grigio); border: 1.5px solid var(--grigio-light); }
  .btn-ghost:hover { border-color: var(--nero); color: var(--nero); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* RESULTS */
  #results {
    display: none;
    text-align: center;
    padding: 20px 0 40px;
    animation: fadeSlide 0.5s ease forwards;
  }
  .result-header {
    background: var(--nero);
    padding: 50px 40px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .result-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(184,146,42,0.15) 0%, transparent 70%);
  }
  .result-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 90px;
    color: var(--oro);
    line-height: 1;
    font-weight: 600;
    position: relative;
  }
  .result-score sup { font-size: 36px; vertical-align: super; }
  .result-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: #888;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
  }
  .result-verdict {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--bianco);
    margin-top: 20px;
    font-style: italic;
    position: relative;
  }
  .review-list { text-align: left; margin-bottom: 28px; }
  .review-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 16px 20px;
    border-bottom: 1px solid var(--grigio-light);
    font-size: 13px;
    line-height: 1.5;
  }
  .review-item:last-child { border-bottom: none; }
  .review-dot {
    width: 24px;
    height: 24px;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
    font-weight: 700;
  }
  .review-dot.ok { background: var(--verde); color: white; }
  .review-dot.ko { background: var(--rosso); color: white; }
  .review-q { font-family: 'Cormorant Garamond', serif; font-size: 16px; margin-bottom: 4px; }
  .review-ans { font-size: 11.5px; color: var(--grigio); }
  .review-ans span { font-weight: 700; }
  .btn-restart { margin-top: 10px; }

  @media (max-width: 600px) {
    .question-card { padding: 24px 20px; }
    .header { padding: 28px 20px 24px; }
    .progress-wrap { padding: 0 20px 20px; }
    .main { padding: 28px 16px 48px; }
    .tf-options { flex-direction: row; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Business Ethics · Assessment</div>
  <div class="gold-line"></div>
  <h1>Business – <span>Ethics</span></h1>
  <div class="header-sub">10 Questions &nbsp;·&nbsp; True / False &nbsp;&amp;&nbsp; Multiple Choice</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 10</div>
</div>

<div class="main">

  <script>
    const questions = [
      // MCQs (Part 1)
      { section: "Part 1: Multiple Choice", text: '1. What does the "Bathsheba Syndrome" describe in a business context?',
        type: 'mcq', opts: ['A. A psychological disorder affecting entry-level employees.','B. A legal loophole used to avoid environmental regulations.','C. A leadership failure caused by success, hubris, and a sense of invincibility.','D. A method for calculating the social impact of a project.'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '2. According to Howard Gardner, what is the fundamental question asked by an "ethical mind"?',
        type: 'mcq', opts: ['A. "What is the maximum profit we can achieve?"','B. "If all workers in my profession did what I do, what would the world be like?"','C. "What is the legal risk of this specific action?"','D. "How can I follow orders more efficiently?"'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '3. Which ethical theory evaluates the rightness of an action based on producing the "greatest good for the greatest number"?',
        type: 'mcq', opts: ['A. Virtue Ethics','B. Kantian Deontology','C. Utilitarianism','D. Ethical Egoism'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '4. In the "Layers of Business Ethics," Layer 1 refers to:',
        type: 'mcq', opts: ['A. Decisions influenced by industry competition.','B. Individual choices and the ethical standards employees bring to an organization.','C. Decisions made based on societal cultural norms.','D. Organizational policies carried out by employees.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '5. The Brundtland Report (1987) defines sustainable development as development that:',
        type: 'mcq', opts: ['A. Prioritizes economic growth above all other factors.','B. Meets the needs of the present without compromising the ability of future generations to meet their own needs.','C. Focuses exclusively on reducing the carbon footprint of manufacturing.','D. Eliminates the need for corporate profits.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '6. Which "Practical Ethical Test" asks if you would be comfortable seeing your decision on the front page of a major publication?',
        type: 'mcq', opts: ['A. The Grandma Test','B. The Sleep Test','C. The Newspaper Test','D. The Categorical Imperative'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '7. In the Power/Interest Stakeholder Matrix, stakeholders with high power and high interest are classified as:',
        type: 'mcq', opts: ['A. Monitor','B. Keep Satisfied','C. Keep Informed','D. Key Players'], answer: 'D' },
      { section: "Part 1: Multiple Choice", text: '8. The "Triple Bottom Line" (3Ps) model manages a firm based on:',
        type: 'mcq', opts: ['A. Price, Product, and Promotion','B. Profits, People, and Planet','C. Planning, Production, and Purchasing','D. Politics, Performance, and Privacy'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '9. Which reasoning flaw involves calling an unethical act by a different name, such as calling cheating "teamwork"?',
        type: 'mcq', opts: ['A. Rationalization','B. Labeling','C. Blind Obedience','D. Minimization'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '10. Kantian Ethics (Deontology) is primarily focused on:',
        type: 'mcq', opts: ['A. Foreseeable consequences and outcomes.','B. Character excellences and moral habits.','C. Duty, rules, and universal moral laws.','D. Maximizing individual pleasure.'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '11. How many Sustainable Development Goals (SDGs) are included in the UN 2030 Agenda?',
        type: 'mcq', opts: ['A. 10','B. 12','C. 17','D. 25'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '12. In the Volkswagen emissions scandal, the "defeat device" caused cars to emit how much more nitrogen oxide than the legal limit?',
        type: 'mcq', opts: ['A. 2 times','B. 10 times','C. 40 times','D. 100 times'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '13. Which layer of ethics involves the "The industry made me do it" rationalization?',
        type: 'mcq', opts: ['A. Layer 1','B. Layer 2','C. Layer 3','D. Layer 4'], answer: 'C' },
      { section: "Part 1: Multiple Choice", text: '14. A "Personal Credo" is described as:',
        type: 'mcq', opts: ['A. A company\'s legally binding mission statement.','B. An individual\'s ethical anchor and pre-set compass for resisting pressure.','C. A list of competitors\' weaknesses.','D. A government-mandated code of conduct.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '15. What is the primary difference between Industry 4.0 and Industry 5.0?',
        type: 'mcq', opts: ['A. Industry 5.0 is focused solely on AI.','B. Industry 5.0 is more human-centric, resilient, and sustainable.','C. Industry 4.0 uses no technology.','D. There is no difference; they are the same concept.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '16. Which economy model is based on the shift from "ownership" to "usage" (access over ownership)?',
        type: 'mcq', opts: ['A. Linear Economy','B. Performance Economy','C. Traditional Economy','D. Command Economy'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '17. "Corporate Shared Value" (CSV) differs from traditional CSR because it focuses on:',
        type: 'mcq', opts: ['A. Philanthropy and giving back.','B. Maximizing competitive value by solving social problems.','C. Only complying with the law.','D. Minimizing all business operations.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '18. In the Volkswagen case, many employees used which mental trap to justify their actions?',
        type: 'mcq', opts: ['A. The Grandma Test','B. Obedience to Authority ("They made me do it").','C. Virtue Ethics','D. The 17 SDGs'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '19. Aristotle\'s Virtue Ethics is primarily about:',
        type: 'mcq', opts: ['A. Following a specific list of 10 rules.','B. Becoming a good person through character and moral habits.','C. Calculating the cost-benefit of every decision.','D. Avoiding all legal liability.'], answer: 'B' },
      { section: "Part 1: Multiple Choice", text: '20. According to the sources, what is a common critique of the "If it\'s legal, then it\'s ethical" standard?',
        type: 'mcq', opts: ['A. It is too expensive to follow.','B. It ignores underlying ethical issues and risks that laws may not cover.','C. It makes decision-making too complicated.','D. It is only applicable to small businesses.'], answer: 'B' },
      // True/False (Part 2)
      { section: "Part 2: True / False", text: '1. Ethics is the same thing as legal compliance; if an action is legal, it is always moral.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '2. Utilitarianism can sometimes justify harming a minority for the gain of the majority.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '3. In Layer 2 of Business Ethics, ethical issues can be fixed simply by providing individual employees with more training.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '4. The "Slippery Slope" refers to the idea that small ethical compromises rarely lead to bigger ones.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '5. According to the UN, sustainable development must meet present needs without compromising future generations.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '6. Whistleblowing is a form of external disclosure used when employees have no control over executive-level decisions.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '7. The Circular Economy is designed to produce no waste and pollution by design.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '8. Kantian ethics suggests we should treat people as a "means to an end" rather than "ends in themselves."',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '9. The "Sleep Test" is a practical tool to check if a decision allows you to have peace of mind.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '10. Volkswagen was required to operate under a federal monitor from 2017 to 2020 to reform its culture.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '11. A person with an "analytical mind" deals primarily in risks to human life rather than probabilities.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '12. Rationalization is the mental trick of changing language to justify unethical behavior.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '13. Secondary stakeholders are those who have a direct financial contract with the company.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '14. Corporate Social Responsibility (CSR) often touches every part of a business, including the supply chain and HR.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '15. The "Grandma Test" involves asking what the legal consequences of an action would be.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '16. Success can paradoxically make a leader more susceptible to ethical failure.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '17. "Corporate Shared Value" (CSV) is essentially the same thing as philanthropy.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '18. The EPA alleged that Volkswagen cars emitted up to 40 times the legal amount of nitrogen oxide.',
        type: 'tf', answer: 'True' },
      { section: "Part 2: True / False", text: '19. Virtue Ethics is often criticized for being too rigid and rule-based.',
        type: 'tf', answer: 'False' },
      { section: "Part 2: True / False", text: '20. An ethical credo helps individuals resist pressure from an organization\'s culture.',
        type: 'tf', answer: 'True' }
    ];

   </div>
    
  <!-- NAV -->
  <div class="nav" id="nav">
    <button class="btn btn-ghost" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
    <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="result-header">
      <div class="result-score" id="scoreDisplay"><sup></sup><span id="scoreNum">0</span><sup>/10</sup></div>
      <div class="result-label">Final Score</div>
      <div class="result-verdict" id="verdict"></div>
    </div>
    <div class="review-list" id="reviewList"></div>
    <button class="btn btn-primary btn-restart" onclick="restartQuiz()">↺ &nbsp; Restart Quiz</button>
  </div>

</div>
function selectOption(card, option) {
  const qNum = parseInt(card.dataset.q);
  const val = option.dataset.val;
  const correct = card.dataset.correct;
  if (answers[qNum] !== undefined) return;

  answers[qNum] = val;
  const isCorrect = val === correct;
  const fb = document.getElementById('fb' + qNum);
  const qData = questions[qNum - 1];

  // Mark all options
  card.querySelectorAll('.option').forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.val === correct) o.classList.add('correct');
    if (o.dataset.val === val && !isCorrect) o.classList.add('wrong');
    if (o.dataset.val === val && isCorrect) o.classList.add('correct');
  });

  fb.innerHTML = isCorrect ? qData.explanation.correct : qData.explanation.wrong;
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');

  updateProgress();
  updateNavButtons();
}

// Attach listeners
cards.forEach(card => {
  card.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => selectOption(card, opt));
  });
});

function showResults() {
  document.getElementById('nav').style.display = 'none';
  cards.forEach(c => c.style.display = 'none');
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';

  let score = 0;
  questions.forEach(q => {
    if (answers[q.q] === q.correct) score++;
  });

  document.getElementById('scoreNum').textContent = score;

  const verdicts = [
    [0,3, "Keep studying — revisit the Code carefully."],
    [4,5, "Fair understanding — some principles need review."],
    [6,7, "Good grasp of the fundamentals."],
    [8,9, "Excellent — strong command of the Code."],
    [10,10, "Perfect score — outstanding mastery."]
  ];
  let verdict = '';
  for (const [min, max, label] of verdicts) {
    if (score >= min && score <= max) { verdict = label; break; }
  }
  document.getElementById('verdict').textContent = verdict;

  const reviewList = document.getElementById('reviewList');
  questions.forEach(q => {
    const userAns = answers[q.q];
    const isOk = userAns === q.correct;
    const item = document.createElement('div');
    item.className = 'review-item';

    const card = document.querySelector(`[data-q="${q.q}"]`);
    const qText = card.querySelector('.q-text').textContent.trim().substring(0, 80) + '…';

    let displayAns = userAns;
    if (q.type === 'tf') {
      displayAns = userAns === 'true' ? 'True' : 'False';
    } else {
      displayAns = 'Option ' + userAns.toUpperCase();
    }
    let displayCorrect = q.correct;
    if (q.type === 'tf') {
      displayCorrect = q.correct === 'true' ? 'True' : 'False';
    } else {
      displayCorrect = 'Option ' + q.correct.toUpperCase();
    }

    item.innerHTML = `
      <div class="review-dot ${isOk ? 'ok' : 'ko'}">${isOk ? '✓' : '✗'}</div>
      <div>
        <div class="review-q">Q${q.q}: ${qText}</div>
        <div class="review-ans">
          Your answer: <span style="color:${isOk ? 'var(--verde)' : 'var(--rosso)'}">${displayAns}</span>
          ${!isOk ? `&nbsp;·&nbsp; Correct: <span style="color:var(--verde)">${displayCorrect}</span>` : ''}
        </div>
      </div>
    `;
    reviewList.appendChild(item);
  });
}

function restartQuiz() {
  answers = {};
  current = 0;
  document.getElementById('results').style.display = 'none';
  document.getElementById('reviewList').innerHTML = '';
  document.getElementById('nav').style.display = 'flex';

  cards.forEach((card, i) => {
    card.style.display = '';
    card.classList.remove('active');
    card.querySelectorAll('.option').forEach(o => {
      o.classList.remove('selected', 'correct', 'wrong', 'disabled');
    });
    const qNum = parseInt(card.dataset.q);
    const fb = document.getElementById('fb' + qNum);
    if (fb) { fb.className = 'feedback'; fb.innerHTML = ''; }
  });

  cards[0].classList.add('active');
  updateProgress();
  updateNavButtons();
}

updateNavButtons();
</script>
</body>
</html>
