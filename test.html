<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business Ethics &amp; Sustainability Practice Quiz (Test 2)</title>
  <style>
    :root{
      --bg:#faf7f2;
      --card:#ffffff;
      --text:#222;
      --muted:#555;
      --gold:#B8922A;
      --shadow:0 3px 16px rgba(184,146,42,0.11);
      --radius:10px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Montserrat,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:680px;
      margin:40px auto;
      padding:0 18px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:32px 28px;
    }
    h1{margin:0 0 8px 0;font-size:1.45rem;}
    .progress-label{
      text-align:right;
      font-size:0.9rem;
      color:var(--muted);
      margin-bottom:6px;
    }
    .progress-bar-wrap{
      background:rgba(184,146,42,0.12);
      border-radius:8px;
      height:7px;
      margin-bottom:22px;
    }
    .progress-bar{
      background:var(--gold);
      height:100%;
      border-radius:8px;
      transition:width 0.3s;
    }
    .section-badge{
      display:inline-block;
      font-size:0.78rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:0.06em;
      color:var(--gold);
      border:1px solid var(--gold);
      border-radius:20px;
      padding:2px 12px;
      margin-bottom:16px;
    }
    .q-text{
      font-size:1.06rem;
      font-weight:700;
      margin:0 0 18px 0;
      line-height:1.55;
    }
    .opts{display:flex;flex-direction:column;gap:9px;}
    .opt-label{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:11px 14px;
      border-radius:8px;
      border:1px solid rgba(184,146,42,0.22);
      cursor:pointer;
      color:#1a1a1a;
      background:rgba(250,247,242,0.5);
      transition:background .12s,border-color .12s;
    }
    .opt-label input[type=radio]{
      margin-top:3px;
      accent-color:var(--gold);
      flex-shrink:0;
    }
    .opt-label:hover{background:rgba(184,146,42,0.10);border-color:var(--gold);}
    .opt-label.selected{background:rgba(184,146,42,0.14);border-color:var(--gold);}
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:26px;
      gap:10px;
    }
    .btn{
      background:var(--bg);
      color:#1a1a1a;
      border:1px solid var(--gold);
      border-radius:8px;
      font-family:Montserrat,Arial,sans-serif;
      font-size:1rem;
      font-weight:600;
      padding:11px 26px;
      cursor:pointer;
      transition:background .14s,color .14s;
    }
    .btn:hover:not(:disabled){background:var(--gold);color:#fff;}
    .btn:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-primary{background:var(--gold);color:#fff;}
    .btn-primary:hover:not(:disabled){background:#9a7620;}
    .score-page{text-align:center;}
    .score-circle{
      width:130px;height:130px;
      border-radius:50%;
      border:5px solid var(--gold);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      margin:24px auto;
      font-size:2rem;
      font-weight:800;
      color:var(--gold);
    }
    .score-circle span{font-size:1rem;font-weight:600;color:var(--muted);}
    .score-msg{font-size:1.06rem;color:var(--muted);margin-bottom:24px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="quizCard"></div>
  </div>
  <script>
    const LABELS = ['A','B','C','D'];

    const questions = [
      // MCQ 1-20
      {type:'mcq',n:1, text:'What does the \u201cBathsheba Syndrome\u201d describe in a business context?',
       opts:['A psychological disorder affecting entry-level employees.',
             'A legal loophole used to avoid environmental regulations.',
             'A leadership failure caused by success, hubris, and a sense of invincibility.',
             'A method for calculating the social impact of a project.'],
       answer:'C'},
      {type:'mcq',n:2, text:'According to Howard Gardner, what is the fundamental question asked by an \u201cethical mind\u201d?',
       opts:['\u201cWhat is the maximum profit we can achieve?\u201d',
             '\u201cIf all workers in my profession did what I do, what would the world be like?\u201d',
             '\u201cWhat is the legal risk of this specific action?\u201d',
             '\u201cHow can I follow orders more efficiently?\u201d'],
       answer:'B'},
      {type:'mcq',n:3, text:'Which ethical theory evaluates the rightness of an action based on producing the \u201cgreatest good for the greatest number\u201d?',
       opts:['Virtue Ethics','Kantian Deontology','Utilitarianism','Ethical Egoism'],
       answer:'C'},
      {type:'mcq',n:4, text:'In the \u201cLayers of Business Ethics,\u201d Layer 1 refers to:',
       opts:['Decisions influenced by industry competition.',
             'Individual choices and the ethical standards employees bring to an organization.',
             'Decisions made based on societal cultural norms.',
             'Organizational policies carried out by employees.'],
       answer:'B'},
      {type:'mcq',n:5, text:'The Brundtland Report (1987) defines sustainable development as development that:',
       opts:['Prioritizes economic growth above all other factors.',
             'Meets the needs of the present without compromising the ability of future generations to meet their own needs.',
             'Focuses exclusively on reducing the carbon footprint of manufacturing.',
             'Eliminates the need for corporate profits.'],
       answer:'B'},
      {type:'mcq',n:6, text:'Which \u201cPractical Ethical Test\u201d asks if you would be comfortable seeing your decision on the front page of a major publication?',
       opts:['The Grandma Test','The Sleep Test','The Newspaper Test','The Categorical Imperative'],
       answer:'C'},
      {type:'mcq',n:7, text:'In the Power/Interest Stakeholder Matrix, stakeholders with high power and high interest are classified as:',
       opts:['Monitor','Keep Satisfied','Keep Informed','Key Players'],
       answer:'D'},
      {type:'mcq',n:8, text:'The \u201cTriple Bottom Line\u201d (3Ps) model manages a firm based on:',
       opts:['Price, Product, and Promotion',
             'Profits, People, and Planet',
             'Planning, Production, and Purchasing',
             'Politics, Performance, and Privacy'],
       answer:'B'},
      {type:'mcq',n:9, text:'Which reasoning flaw involves calling an unethical act by a different name, such as calling cheating \u201cteamwork\u201d?',
       opts:['Rationalization','Labeling','Blind Obedience','Minimization'],
       answer:'B'},
      {type:'mcq',n:10, text:'Kantian Ethics (Deontology) is primarily focused on:',
       opts:['Foreseeable consequences and outcomes.',
             'Character excellences and moral habits.',
             'Duty, rules, and universal moral laws.',
             'Maximizing individual pleasure.'],
       answer:'C'},
      {type:'mcq',n:11, text:'How many Sustainable Development Goals (SDGs) are included in the UN 2030 Agenda?',
       opts:['10','12','17','25'],
       answer:'C'},
      {type:'mcq',n:12, text:'In the Volkswagen emissions scandal, the \u201cdefeat device\u201d caused cars to emit how much more nitrogen oxide than the legal limit?',
       opts:['2 times','10 times','40 times','100 times'],
       answer:'C'},
      {type:'mcq',n:13, text:'Which layer of ethics involves the \u201cThe industry made me do it\u201d rationalization?',
       opts:['Layer 1','Layer 2','Layer 3','Layer 4'],
       answer:'C'},
      {type:'mcq',n:14, text:'A \u201cPersonal Credo\u201d is described as:',
       opts:['A company\u2019s legally binding mission statement.',
             'An individual\u2019s ethical anchor and pre-set compass for resisting pressure.',
             'A list of competitors\u2019 weaknesses.',
             'A government-mandated code of conduct.'],
       answer:'B'},
      {type:'mcq',n:15, text:'What is the primary difference between Industry 4.0 and Industry 5.0?',
       opts:['Industry 5.0 is focused solely on AI.',
             'Industry 5.0 is more human-centric, resilient, and sustainable.',
             'Industry 4.0 uses no technology.',
             'There is no difference; they are the same concept.'],
       answer:'B'},
      {type:'mcq',n:16, text:'Which economy model is based on the shift from \u201cownership\u201d to \u201cusage\u201d (access over ownership)?',
       opts:['Linear Economy','Performance Economy','Traditional Economy','Command Economy'],
       answer:'B'},
      {type:'mcq',n:17, text:'\u201cCorporate Shared Value\u201d (CSV) differs from traditional CSR because it focuses on:',
       opts:['Philanthropy and giving back.',
             'Maximizing competitive value by solving social problems.',
             'Only complying with the law.',
             'Minimizing all business operations.'],
       answer:'B'},
      {type:'mcq',n:18, text:'In the Volkswagen case, many employees used which mental trap to justify their actions?',
       opts:['The Grandma Test',
             'Obedience to Authority (\u201cThey made me do it\u201d).',
             'Virtue Ethics',
             'The 17 SDGs'],
       answer:'B'},
      {type:'mcq',n:19, text:'Aristotle\u2019s Virtue Ethics is primarily about:',
       opts:['Following a specific list of 10 rules.',
             'Becoming a good person through character and moral habits.',
             'Calculating the cost-benefit of every decision.',
             'Avoiding all legal liability.'],
       answer:'B'},
      {type:'mcq',n:20, text:'According to the sources, what is a common critique of the \u201cIf it\u2019s legal, then it\u2019s ethical\u201d standard?',
       opts:['It is too expensive to follow.',
             'It ignores underlying ethical issues and risks that laws may not cover.',
             'It makes decision-making too complicated.',
             'It is only applicable to small businesses.'],
       answer:'B'},
      // True/False 1-20
      {type:'tf',n:1, text:'Ethics is the same thing as legal compliance; if an action is legal, it is always moral.', answer:'False'},
      {type:'tf',n:2, text:'Utilitarianism can sometimes justify harming a minority for the gain of the majority.', answer:'True'},
      {type:'tf',n:3, text:'In Layer 2 of Business Ethics, ethical issues can be fixed simply by providing individual employees with more training.', answer:'False'},
      {type:'tf',n:4, text:'The \u201cSlippery Slope\u201d refers to the idea that small ethical compromises rarely lead to bigger ones.', answer:'False'},
      {type:'tf',n:5, text:'According to the UN, sustainable development must meet present needs without compromising future generations.', answer:'True'},
      {type:'tf',n:6, text:'Whistleblowing is a form of external disclosure used when employees have no control over executive-level decisions.', answer:'True'},
      {type:'tf',n:7, text:'The Circular Economy is designed to produce no waste and pollution by design.', answer:'True'},
      {type:'tf',n:8, text:'Kantian ethics suggests we should treat people as a \u201cmeans to an end\u201d rather than \u201cends in themselves.\u201d', answer:'False'},
      {type:'tf',n:9, text:'The \u201cSleep Test\u201d is a practical tool to check if a decision allows you to have peace of mind.', answer:'True'},
      {type:'tf',n:10, text:'Volkswagen was required to operate under a federal monitor from 2017 to 2020 to reform its culture.', answer:'True'},
      {type:'tf',n:11, text:'A person with an \u201canalytical mind\u201d deals primarily in risks to human life rather than probabilities.', answer:'False'},
      {type:'tf',n:12, text:'Rationalization is the mental trick of changing language to justify unethical behavior.', answer:'True'},
      {type:'tf',n:13, text:'Secondary stakeholders are those who have a direct financial contract with the company.', answer:'False'},
      {type:'tf',n:14, text:'Corporate Social Responsibility (CSR) often touches every part of a business, including the supply chain and HR.', answer:'True'},
      {type:'tf',n:15, text:'The \u201cGrandma Test\u201d involves asking what the legal consequences of an action would be.', answer:'False'},
      {type:'tf',n:16, text:'Success can paradoxically make a leader more susceptible to ethical failure.', answer:'True'},
      {type:'tf',n:17, text:'\u201cCorporate Shared Value\u201d (CSV) is essentially the same thing as philanthropy.', answer:'False'},
      {type:'tf',n:18, text:'The EPA alleged that Volkswagen cars emitted up to 40 times the legal amount of nitrogen oxide.', answer:'True'},
      {type:'tf',n:19, text:'Virtue Ethics is often criticized for being too rigid and rule-based.', answer:'False'},
      {type:'tf',n:20, text:'An ethical credo helps individuals resist pressure from an organization\u2019s culture.', answer:'True'}
    ];

    let current = 0;
    let answers = new Array(questions.length).fill(null);

    function renderQuestion(idx) {
      const q = questions[idx];
      const isLast = idx === questions.length - 1;
      const section = q.type === 'mcq' ? 'Part 1 \u2014 Multiple Choice' : 'Part 2 \u2014 True / False';
      var pct = (idx / questions.length * 100).toFixed(1);
      var selected = answers[idx];

      var optsHtml = '';
      if (q.type === 'mcq') {
        for (var i = 0; i < q.opts.length; i++) {
          var lbl = LABELS[i];
          var checked = selected === lbl ? ' checked' : '';
          var cls = selected === lbl ? ' selected' : '';
          optsHtml += '<label class="opt-label' + cls + '">' +
            '<input type="radio" name="q" value="' + lbl + '"' + checked + '> ' +
            '<span>' + lbl + '. ' + escHtml(q.opts[i]) + '</span></label>';
        }
      } else {
        ['True', 'False'].forEach(function(val) {
          var checked = selected === val ? ' checked' : '';
          var cls = selected === val ? ' selected' : '';
          optsHtml += '<label class="opt-label' + cls + '">' +
            '<input type="radio" name="q" value="' + val + '"' + checked + '> ' +
            '<span>' + val + '</span></label>';
        });
      }

      var nextLabel = isLast ? 'Submit' : 'Next &#8594;';

      document.getElementById('quizCard').innerHTML =
        '<h1>Business Ethics &amp; Sustainability Quiz</h1>' +
        '<div class="progress-label">' + (idx + 1) + ' / ' + questions.length + '</div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="section-badge">' + section + ' &mdash; Q' + q.n + '</div>' +
        '<p class="q-text">' + (idx + 1) + '. ' + escHtml(q.text) + '</p>' +
        '<div class="opts" id="opts">' + optsHtml + '</div>' +
        '<div class="nav">' +
          '<button class="btn" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>&#8592; Previous</button>' +
          '<button class="btn btn-primary" id="nextBtn"' + (selected === null ? ' disabled' : '') + '>' + nextLabel + '</button>' +
        '</div>';

      document.getElementById('prevBtn').addEventListener('click', function() { goTo(idx - 1); });
      document.getElementById('nextBtn').addEventListener('click', function() {
        if (isLast) { showScore(); } else { goTo(idx + 1); }
      });

      document.querySelectorAll('#opts input[type=radio]').forEach(function(radio) {
        radio.addEventListener('change', function() {
          answers[idx] = this.value;
          document.querySelectorAll('#opts .opt-label').forEach(function(l) { l.classList.remove('selected'); });
          this.closest('.opt-label').classList.add('selected');
          document.getElementById('nextBtn').disabled = false;
        });
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function goTo(idx) {
      current = idx;
      renderQuestion(current);
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function showScore() {
      var score = 0;
      for (var i = 0; i < questions.length; i++) {
        if (answers[i] === questions[i].answer) score++;
      }
      var pct = Math.round(score / questions.length * 100);
      document.getElementById('quizCard').innerHTML =
        '<div class="score-page">' +
          '<h1>Quiz Complete!</h1>' +
          '<p>Business Ethics &amp; Sustainability &mdash; Test 2</p>' +
          '<div class="score-circle">' + score + '<span>/ 40</span></div>' +
          '<p class="score-msg">You scored <strong>' + score + ' out of 40</strong> (' + pct + '%)</p>' +
          '<button class="btn btn-primary" id="restartBtn">&#8635; Restart Quiz</button>' +
        '</div>';
      document.getElementById('restartBtn').addEventListener('click', restart);
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function restart() {
      answers = new Array(questions.length).fill(null);
      current = 0;
      renderQuestion(0);
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    renderQuestion(0);
  </script>
</body>
</html>
