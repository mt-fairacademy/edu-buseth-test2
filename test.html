<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Business Ethics &amp; Sustainability Practice Quiz (Test 2)</title>
  <style>
    :root{
      --bg:#faf7f2;
      --card:#ffffff;
      --text:#222;
      --muted:#555;
      --gold:#B8922A;
      --shadow:0 3px 16px rgba(184,146,42,0.11);
      --radius:10px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Montserrat,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:720px;
      margin:40px auto;
      padding:0 18px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:32px 28px;
    }
    h1{margin:0 0 6px 0;font-size:1.5rem}
    .sub{margin:0 0 24px 0;color:var(--muted);font-size:0.97rem}
    .progress-bar-wrap{
      background:rgba(184,146,42,0.12);
      border-radius:99px;
      height:7px;
      margin-bottom:24px;
      overflow:hidden;
    }
    .progress-bar{
      height:100%;
      background:var(--gold);
      border-radius:99px;
      transition:width 0.3s;
    }
    .progress-label{
      font-size:0.88rem;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:600;
    }
    .question-text{
      font-size:1.1rem;
      font-weight:700;
      margin:0 0 20px 0;
      line-height:1.5;
    }
    .opts{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
    .opt-label{
      display:flex;
      align-items:flex-start;
      gap:12px;
      padding:12px 14px;
      border:1.5px solid rgba(184,146,42,0.22);
      border-radius:8px;
      cursor:pointer;
      transition:background 0.13s,border-color 0.13s;
      font-size:1rem;
    }
    .opt-label:hover{background:rgba(184,146,42,0.08);border-color:var(--gold)}
    .opt-label input{margin-top:2px;flex-shrink:0;accent-color:var(--gold)}
    .opt-label.selected{background:rgba(184,146,42,0.13);border-color:var(--gold)}
    .nav{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{
      background:var(--bg);
      color:#1a1a1a;
      border:1.5px solid var(--gold);
      border-radius:8px;
      font-size:1rem;
      font-family:inherit;
      font-weight:600;
      padding:10px 24px;
      cursor:pointer;
      transition:background 0.14s,color 0.14s;
    }
    .btn:hover:not(:disabled){background:var(--gold);color:#fff}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .btn-primary{background:var(--gold);color:#fff}
    .btn-primary:hover:not(:disabled){background:#9a7820;border-color:#9a7820}

    /* Finish screen */
    .finish-header{text-align:center;margin-bottom:24px}
    .score-badge{
      display:inline-block;
      font-size:2.4rem;
      font-weight:700;
      color:var(--gold);
      margin:8px 0;
    }
    .score-sub{color:var(--muted);font-size:0.97rem}
    .restart-wrap{text-align:center;margin-bottom:28px}
    .review-title{font-size:1.05rem;font-weight:700;margin:0 0 14px 0;border-bottom:1.5px solid rgba(184,146,42,0.2);padding-bottom:8px}
    .review-item{
      padding:12px 14px;
      border-radius:8px;
      margin-bottom:10px;
      border:1.5px solid transparent;
    }
    .review-item.correct{background:rgba(39,174,96,0.08);border-color:rgba(39,174,96,0.25)}
    .review-item.incorrect{background:rgba(192,57,43,0.07);border-color:rgba(192,57,43,0.22)}
    .review-q{font-weight:600;margin:0 0 6px 0;font-size:0.97rem}
    .review-detail{font-size:0.9rem;color:var(--muted);margin:2px 0}
    .review-verdict{font-weight:700;font-size:0.9rem}
    .review-verdict.c{color:#27ae60}
    .review-verdict.w{color:#c0392b}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="quizCard"></div>
  </div>

  <script>
    const questions = [
      // MCQs 1-20
      {q:"1. What does the \"Bathsheba Syndrome\" describe in a business context?",
       opts:["A. A psychological disorder affecting entry-level employees.","B. A legal loophole used to avoid environmental regulations.","C. A leadership failure caused by success, hubris, and a sense of invincibility.","D. A method for calculating the social impact of a project."],
       key:"C"},
      {q:"2. According to Howard Gardner, what is the fundamental question asked by an \"ethical mind\"?",
       opts:["A. \"What is the maximum profit we can achieve?\"","B. \"If all workers in my profession did what I do, what would the world be like?\"","C. \"What is the legal risk of this specific action?\"","D. \"How can I follow orders more efficiently?\""],
       key:"B"},
      {q:"3. Which ethical theory evaluates the rightness of an action based on producing the \"greatest good for the greatest number\"?",
       opts:["A. Virtue Ethics","B. Kantian Deontology","C. Utilitarianism","D. Ethical Egoism"],
       key:"C"},
      {q:"4. In the \"Layers of Business Ethics,\" Layer 1 refers to:",
       opts:["A. Decisions influenced by industry competition.","B. Individual choices and the ethical standards employees bring to an organization.","C. Decisions made based on societal cultural norms.","D. Organizational policies carried out by employees."],
       key:"B"},
      {q:"5. The Brundtland Report (1987) defines sustainable development as development that:",
       opts:["A. Prioritizes economic growth above all other factors.","B. Meets the needs of the present without compromising the ability of future generations to meet their own needs.","C. Focuses exclusively on reducing the carbon footprint of manufacturing.","D. Eliminates the need for corporate profits."],
       key:"B"},
      {q:"6. Which \"Practical Ethical Test\" asks if you would be comfortable seeing your decision on the front page of a major publication?",
       opts:["A. The Grandma Test","B. The Sleep Test","C. The Newspaper Test","D. The Categorical Imperative"],
       key:"C"},
      {q:"7. In the Power/Interest Stakeholder Matrix, stakeholders with high power and high interest are classified as:",
       opts:["A. Monitor","B. Keep Satisfied","C. Keep Informed","D. Key Players"],
       key:"D"},
      {q:"8. The \"Triple Bottom Line\" (3Ps) model manages a firm based on:",
       opts:["A. Price, Product, and Promotion","B. Profits, People, and Planet","C. Planning, Production, and Purchasing","D. Politics, Performance, and Privacy"],
       key:"B"},
      {q:"9. Which reasoning flaw involves calling an unethical act by a different name, such as calling cheating \"teamwork\"?",
       opts:["A. Rationalization","B. Labeling","C. Blind Obedience","D. Minimization"],
       key:"B"},
      {q:"10. Kantian Ethics (Deontology) is primarily focused on:",
       opts:["A. Foreseeable consequences and outcomes.","B. Character excellences and moral habits.","C. Duty, rules, and universal moral laws.","D. Maximizing individual pleasure."],
       key:"C"},
      {q:"11. How many Sustainable Development Goals (SDGs) are included in the UN 2030 Agenda?",
       opts:["A. 10","B. 12","C. 17","D. 25"],
       key:"C"},
      {q:"12. In the Volkswagen emissions scandal, the \"defeat device\" caused cars to emit how much more nitrogen oxide than the legal limit?",
       opts:["A. 2 times","B. 10 times","C. 40 times","D. 100 times"],
       key:"C"},
      {q:"13. Which layer of ethics involves the \"The industry made me do it\" rationalization?",
       opts:["A. Layer 1","B. Layer 2","C. Layer 3","D. Layer 4"],
       key:"C"},
      {q:"14. A \"Personal Credo\" is described as:",
       opts:["A. A company's legally binding mission statement.","B. An individual's ethical anchor and pre-set compass for resisting pressure.","C. A list of competitors' weaknesses.","D. A government-mandated code of conduct."],
       key:"B"},
      {q:"15. What is the primary difference between Industry 4.0 and Industry 5.0?",
       opts:["A. Industry 5.0 is focused solely on AI.","B. Industry 5.0 is more human-centric, resilient, and sustainable.","C. Industry 4.0 uses no technology.","D. There is no difference; they are the same concept."],
       key:"B"},
      {q:"16. Which economy model is based on the shift from \"ownership\" to \"usage\" (access over ownership)?",
       opts:["A. Linear Economy","B. Performance Economy","C. Traditional Economy","D. Command Economy"],
       key:"B"},
      {q:"17. \"Corporate Shared Value\" (CSV) differs from traditional CSR because it focuses on:",
       opts:["A. Philanthropy and giving back.","B. Maximizing competitive value by solving social problems.","C. Only complying with the law.","D. Minimizing all business operations."],
       key:"B"},
      {q:"18. In the Volkswagen case, many employees used which mental trap to justify their actions?",
       opts:["A. The Grandma Test","B. Obedience to Authority (\"They made me do it\").","C. Virtue Ethics","D. The 17 SDGs"],
       key:"B"},
      {q:"19. Aristotle's Virtue Ethics is primarily about:",
       opts:["A. Following a specific list of 10 rules.","B. Becoming a good person through character and moral habits.","C. Calculating the cost-benefit of every decision.","D. Avoiding all legal liability."],
       key:"B"},
      {q:"20. According to the sources, what is a common critique of the \"If it's legal, then it's ethical\" standard?",
       opts:["A. It is too expensive to follow.","B. It ignores underlying ethical issues and risks that laws may not cover.","C. It makes decision-making too complicated.","D. It is only applicable to small businesses."],
       key:"B"},
      // True/False 21-40
      {q:"21. Ethics is the same thing as legal compliance; if an action is legal, it is always moral.",
       opts:["True","False"],key:"False"},
      {q:"22. Utilitarianism can sometimes justify harming a minority for the gain of the majority.",
       opts:["True","False"],key:"True"},
      {q:"23. In Layer 2 of Business Ethics, ethical issues can be fixed simply by providing individual employees with more training.",
       opts:["True","False"],key:"False"},
      {q:"24. The \"Slippery Slope\" refers to the idea that small ethical compromises rarely lead to bigger ones.",
       opts:["True","False"],key:"False"},
      {q:"25. According to the UN, sustainable development must meet present needs without compromising future generations.",
       opts:["True","False"],key:"True"},
      {q:"26. Whistleblowing is a form of external disclosure used when employees have no control over executive-level decisions.",
       opts:["True","False"],key:"True"},
      {q:"27. The Circular Economy is designed to produce no waste and pollution by design.",
       opts:["True","False"],key:"True"},
      {q:"28. Kantian ethics suggests we should treat people as a \"means to an end\" rather than \"ends in themselves.\"",
       opts:["True","False"],key:"False"},
      {q:"29. The \"Sleep Test\" is a practical tool to check if a decision allows you to have peace of mind.",
       opts:["True","False"],key:"True"},
      {q:"30. Volkswagen was required to operate under a federal monitor from 2017 to 2020 to reform its culture.",
       opts:["True","False"],key:"True"},
      {q:"31. A person with an \"analytical mind\" deals primarily in risks to human life rather than probabilities.",
       opts:["True","False"],key:"False"},
      {q:"32. Rationalization is the mental trick of changing language to justify unethical behavior.",
       opts:["True","False"],key:"True"},
      {q:"33. Secondary stakeholders are those who have a direct financial contract with the company.",
       opts:["True","False"],key:"False"},
      {q:"34. Corporate Social Responsibility (CSR) often touches every part of a business, including the supply chain and HR.",
       opts:["True","False"],key:"True"},
      {q:"35. The \"Grandma Test\" involves asking what the legal consequences of an action would be.",
       opts:["True","False"],key:"False"},
      {q:"36. Success can paradoxically make a leader more susceptible to ethical failure.",
       opts:["True","False"],key:"True"},
      {q:"37. \"Corporate Shared Value\" (CSV) is essentially the same thing as philanthropy.",
       opts:["True","False"],key:"False"},
      {q:"38. The EPA alleged that Volkswagen cars emitted up to 40 times the legal amount of nitrogen oxide.",
       opts:["True","False"],key:"True"},
      {q:"39. Virtue Ethics is often criticized for being too rigid and rule-based.",
       opts:["True","False"],key:"False"},
      {q:"40. An ethical credo helps individuals resist pressure from an organization's culture.",
       opts:["True","False"],key:"True"}
    ];

    const total = questions.length;
    let current = 0;
    let answers = new Array(total).fill(null);

    function render() {
      var card = document.getElementById('quizCard');
      if (current >= total) { renderFinish(); return; }
      var q = questions[current];
      var pct = Math.round((current / total) * 100);
      var section = current < 20 ? 'Part 1: Multiple Choice' : 'Part 2: True / False';

      var optsHTML = q.opts.map(function(o, i) {
        var checked = answers[current] === o ? ' checked' : '';
        var sel = answers[current] === o ? ' selected' : '';
        return '<label class="opt-label' + sel + '">' +
               '<input type="radio" name="q" value="' + esc(o) + '"' + checked + '> ' +
               esc(o) + '</label>';
      }).join('');

      var prevDisabled = current === 0 ? ' disabled' : '';
      var nextLabel = current === total - 1 ? 'Finish' : 'Next &rarr;';
      var nextDisabled = answers[current] === null ? ' disabled' : '';

      card.innerHTML =
        '<h1>Business Ethics &amp; Sustainability Practice Quiz</h1>' +
        '<p class="sub">Test 2 &mdash; 20 MCQs + 20 True/False &nbsp;|&nbsp; ' + esc(section) + '</p>' +
        '<div class="progress-label">Question ' + (current + 1) + ' of ' + total + '</div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
        '<p class="question-text">' + esc(q.q) + '</p>' +
        '<div class="opts" id="opts">' + optsHTML + '</div>' +
        '<div class="nav">' +
          '<button class="btn" id="prevBtn"' + prevDisabled + '>&larr; Previous</button>' +
          '<button class="btn btn-primary" id="nextBtn"' + nextDisabled + '>' + nextLabel + '</button>' +
        '</div>';

      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          answers[current] = this.value;
          document.querySelectorAll('.opt-label').forEach(function(l) { l.classList.remove('selected'); });
          this.parentElement.classList.add('selected');
          document.getElementById('nextBtn').disabled = false;
        });
      });

      document.getElementById('prevBtn').addEventListener('click', function() {
        if (current > 0) { current--; render(); }
      });
      document.getElementById('nextBtn').addEventListener('click', function() {
        if (current < total - 1) { current++; render(); }
        else { current = total; render(); }
      });
    }

    function renderFinish() {
      var score = 0;
      questions.forEach(function(q, i) { if (answers[i] === q.key) score++; });
      var card = document.getElementById('quizCard');

      var reviewHTML = questions.map(function(q, i) {
        var correct = answers[i] === q.key;
        var cls = correct ? 'correct' : 'incorrect';
        var verdict = correct ? '&#10003; Correct' : '&#10007; Incorrect';
        var vcls = correct ? 'c' : 'w';
        return '<div class="review-item ' + cls + '">' +
               '<p class="review-q">' + esc(q.q) + '</p>' +
               '<p class="review-detail">Your answer: <strong>' + esc(answers[i] || 'No answer') + '</strong></p>' +
               '<p class="review-detail">Correct answer: <strong>' + esc(q.key) + '</strong></p>' +
               '<p class="review-verdict ' + vcls + '">' + verdict + '</p>' +
               '</div>';
      }).join('');

      card.innerHTML =
        '<div class="finish-header">' +
          '<h1>Quiz Complete!</h1>' +
          '<div class="score-badge">' + score + ' / ' + total + '</div>' +
          '<p class="score-sub">You answered ' + score + ' out of ' + total + ' questions correctly.</p>' +
        '</div>' +
        '<div class="restart-wrap">' +
          '<button class="btn btn-primary" id="restartBtn">Try Again</button>' +
        '</div>' +
        '<h2 class="review-title">Answer Review</h2>' +
        reviewHTML;

      document.getElementById('restartBtn').addEventListener('click', function() {
        current = 0;
        answers = new Array(total).fill(null);
        render();
      });
    }

    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    render();
  </script>
</body>
</html>
