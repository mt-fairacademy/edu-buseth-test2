<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Business Ethics &amp; Sustainability Practice Quiz (Test 2)</title>
  <style>
    :root{
      --bg:#faf7f2;
      --card:#ffffff;
      --text:#222;
      --muted:#555;
      --gold:#B8922A;
      --green:#2e7d32;
      --red:#c0392b;
      --shadow:0 3px 16px rgba(184,146,42,0.11);
      --radius:10px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Montserrat,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:740px;
      margin:40px auto;
      padding:0 18px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px 28px;
    }
    h1{margin:0 0 4px 0;font-size:1.55rem}
    .sub{margin:0 0 22px 0;color:var(--muted);font-size:0.97rem}
    /* Progress bar */
    .progress-wrap{margin-bottom:18px}
    .progress-label{display:flex;justify-content:space-between;font-size:0.9rem;color:var(--muted);margin-bottom:5px}
    .progress-bar-bg{height:7px;background:rgba(184,146,42,0.15);border-radius:99px;overflow:hidden}
    .progress-bar-fill{height:7px;background:var(--gold);border-radius:99px;transition:width 0.3s}
    /* Section badge */
    .section-badge{
      display:inline-block;
      font-size:0.78rem;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      background:rgba(184,146,42,0.12);
      color:var(--gold);
      border-radius:5px;
      padding:2px 10px;
      margin-bottom:12px;
    }
    /* Question card */
    .q-card{
      border:1px solid rgba(184,146,42,0.25);
      border-radius:var(--radius);
      padding:20px 18px;
      background:rgba(250,247,242,0.35);
      min-height:220px;
    }
    .q-text{font-weight:600;font-size:1.05rem;margin:0 0 16px 0;line-height:1.5}
    .opts label{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:9px 12px;
      border-radius:8px;
      cursor:pointer;
      color:#1a1a1a;
      border:1px solid transparent;
      margin-bottom:6px;
      transition:background .12s,border-color .12s;
    }
    .opts label:hover{background:rgba(184,146,42,0.10);border-color:rgba(184,146,42,0.25)}
    .opts input[type=radio]{margin-top:3px;accent-color:var(--gold);flex-shrink:0}
    /* Selected state */
    .opts label.selected{background:rgba(184,146,42,0.13);border-color:var(--gold)}
    /* Review state */
    .opts label.correct{background:rgba(46,125,50,0.10);border-color:var(--green);color:var(--green)}
    .opts label.wrong{background:rgba(192,57,43,0.08);border-color:var(--red);color:var(--red)}
    /* Navigation */
    .nav{display:flex;gap:10px;align-items:center;margin-top:22px;flex-wrap:wrap}
    .btn{
      background:var(--bg);
      color:#1a1a1a;
      border:1px solid var(--gold);
      border-radius:8px;
      font-size:1rem;
      font-weight:600;
      padding:10px 22px;
      cursor:pointer;
      transition:background .14s,color .14s;
    }
    .btn:hover{background:var(--gold);color:#fff}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .btn-primary{background:var(--gold);color:#fff}
    .btn-primary:hover{background:#a07820;border-color:#a07820}
    .spacer{flex:1}
    /* Results screen */
    .results{display:none}
    .score-big{
      font-size:2.5rem;
      font-weight:800;
      color:var(--gold);
      margin:0;
    }
    .score-label{color:var(--muted);margin:4px 0 24px}
    .review-section{margin-top:28px}
    .review-section h2{font-size:1.1rem;margin:0 0 12px}
    .review-q{
      padding:12px 14px;
      border:1px solid rgba(184,146,42,0.2);
      border-radius:9px;
      margin-bottom:10px;
      font-size:0.95rem;
    }
    .review-q .rq-text{font-weight:600;margin-bottom:5px}
    .review-q .rq-row{display:flex;gap:8px;flex-wrap:wrap;font-size:0.91rem}
    .your-ans{padding:2px 8px;border-radius:5px;font-weight:600}
    .your-ans.ok{background:rgba(46,125,50,0.12);color:var(--green)}
    .your-ans.bad{background:rgba(192,57,43,0.10);color:var(--red)}
    .correct-ans{padding:2px 8px;border-radius:5px;background:rgba(46,125,50,0.10);color:var(--green);font-weight:600}
    .quiz-screen{display:block}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Business Ethics &amp; Sustainability Practice Quiz</h1>
      <p class="sub">Test 2 — 20 MCQs + 20 True/False</p>

      <!-- Quiz screen -->
      <div class="quiz-screen" id="quizScreen">
        <div class="progress-wrap">
          <div class="progress-label">
            <span id="progressText">Question 1 of 40</span>
            <span id="sectionText"></span>
          </div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        <div class="section-badge" id="sectionBadge"></div>
        <div class="q-card">
          <p class="q-text" id="qText"></p>
          <div class="opts" id="qOpts"></div>
        </div>
        <div class="nav">
          <button class="btn" id="prevBtn" onclick="go(-1)" disabled>&#8592; Prev</button>
          <div class="spacer"></div>
          <button class="btn btn-primary" id="nextBtn" onclick="go(1)">Next &#8594;</button>
        </div>
      </div>

      <!-- Results screen -->
      <div class="results" id="resultsScreen">
        <p class="score-big" id="scoreBig"></p>
        <p class="score-label" id="scoreLabel"></p>
        <button class="btn btn-primary" onclick="restartQuiz()">Try Again</button>
        <div class="review-section" id="reviewSection"></div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      // MCQs (index 0-19)
      {section:"MCQ", text:'1. What does the "Bathsheba Syndrome" describe in a business context?', opts:['A. A psychological disorder affecting entry-level employees.','B. A legal loophole used to avoid environmental regulations.','C. A leadership failure caused by success, hubris, and a sense of invincibility.','D. A method for calculating the social impact of a project.'], answer:'C'},
      {section:"MCQ", text:'2. According to Howard Gardner, what is the fundamental question asked by an "ethical mind"?', opts:['A. "What is the maximum profit we can achieve?"','B. "If all workers in my profession did what I do, what would the world be like?"','C. "What is the legal risk of this specific action?"','D. "How can I follow orders more efficiently?"'], answer:'B'},
      {section:"MCQ", text:'3. Which ethical theory evaluates the rightness of an action based on producing the "greatest good for the greatest number"?', opts:['A. Virtue Ethics','B. Kantian Deontology','C. Utilitarianism','D. Ethical Egoism'], answer:'C'},
      {section:"MCQ", text:'4. In the "Layers of Business Ethics," Layer 1 refers to:', opts:['A. Decisions influenced by industry competition.','B. Individual choices and the ethical standards employees bring to an organization.','C. Decisions made based on societal cultural norms.','D. Organizational policies carried out by employees.'], answer:'B'},
      {section:"MCQ", text:'5. The Brundtland Report (1987) defines sustainable development as development that:', opts:['A. Prioritizes economic growth above all other factors.','B. Meets the needs of the present without compromising the ability of future generations to meet their own needs.','C. Focuses exclusively on reducing the carbon footprint of manufacturing.','D. Eliminates the need for corporate profits.'], answer:'B'},
      {section:"MCQ", text:'6. Which "Practical Ethical Test" asks if you would be comfortable seeing your decision on the front page of a major publication?', opts:['A. The Grandma Test','B. The Sleep Test','C. The Newspaper Test','D. The Categorical Imperative'], answer:'C'},
      {section:"MCQ", text:'7. In the Power/Interest Stakeholder Matrix, stakeholders with high power and high interest are classified as:', opts:['A. Monitor','B. Keep Satisfied','C. Keep Informed','D. Key Players'], answer:'D'},
      {section:"MCQ", text:'8. The "Triple Bottom Line" (3Ps) model manages a firm based on:', opts:['A. Price, Product, and Promotion','B. Profits, People, and Planet','C. Planning, Production, and Purchasing','D. Politics, Performance, and Privacy'], answer:'B'},
      {section:"MCQ", text:'9. Which reasoning flaw involves calling an unethical act by a different name, such as calling cheating "teamwork"?', opts:['A. Rationalization','B. Labeling','C. Blind Obedience','D. Minimization'], answer:'B'},
      {section:"MCQ", text:'10. Kantian Ethics (Deontology) is primarily focused on:', opts:['A. Foreseeable consequences and outcomes.','B. Character excellences and moral habits.','C. Duty, rules, and universal moral laws.','D. Maximizing individual pleasure.'], answer:'C'},
      {section:"MCQ", text:'11. How many Sustainable Development Goals (SDGs) are included in the UN 2030 Agenda?', opts:['A. 10','B. 12','C. 17','D. 25'], answer:'C'},
      {section:"MCQ", text:'12. In the Volkswagen emissions scandal, the "defeat device" caused cars to emit how much more nitrogen oxide than the legal limit?', opts:['A. 2 times','B. 10 times','C. 40 times','D. 100 times'], answer:'C'},
      {section:"MCQ", text:'13. Which layer of ethics involves the "The industry made me do it" rationalization?', opts:['A. Layer 1','B. Layer 2','C. Layer 3','D. Layer 4'], answer:'C'},
      {section:"MCQ", text:'14. A "Personal Credo" is described as:', opts:["A. A company's legally binding mission statement.",'B. An individual\'s ethical anchor and pre-set compass for resisting pressure.',"C. A list of competitors' weaknesses.",'D. A government-mandated code of conduct.'], answer:'B'},
      {section:"MCQ", text:'15. What is the primary difference between Industry 4.0 and Industry 5.0?', opts:['A. Industry 5.0 is focused solely on AI.','B. Industry 5.0 is more human-centric, resilient, and sustainable.','C. Industry 4.0 uses no technology.','D. There is no difference; they are the same concept.'], answer:'B'},
      {section:"MCQ", text:'16. Which economy model is based on the shift from "ownership" to "usage" (access over ownership)?', opts:['A. Linear Economy','B. Performance Economy','C. Traditional Economy','D. Command Economy'], answer:'B'},
      {section:"MCQ", text:'17. "Corporate Shared Value" (CSV) differs from traditional CSR because it focuses on:', opts:['A. Philanthropy and giving back.','B. Maximizing competitive value by solving social problems.','C. Only complying with the law.','D. Minimizing all business operations.'], answer:'B'},
      {section:"MCQ", text:'18. In the Volkswagen case, many employees used which mental trap to justify their actions?', opts:['A. The Grandma Test','B. Obedience to Authority ("They made me do it").','C. Virtue Ethics','D. The 17 SDGs'], answer:'B'},
      {section:"MCQ", text:'19. Aristotle\'s Virtue Ethics is primarily about:', opts:['A. Following a specific list of 10 rules.','B. Becoming a good person through character and moral habits.','C. Calculating the cost-benefit of every decision.','D. Avoiding all legal liability.'], answer:'B'},
      {section:"MCQ", text:'20. According to the sources, what is a common critique of the "If it\'s legal, then it\'s ethical" standard?', opts:['A. It is too expensive to follow.','B. It ignores underlying ethical issues and risks that laws may not cover.','C. It makes decision-making too complicated.','D. It is only applicable to small businesses.'], answer:'B'},
      // True/False (index 20-39)
      {section:"True/False", text:'1. Ethics is the same thing as legal compliance; if an action is legal, it is always moral.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'2. Utilitarianism can sometimes justify harming a minority for the gain of the majority.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'3. In Layer 2 of Business Ethics, ethical issues can be fixed simply by providing individual employees with more training.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'4. The "Slippery Slope" refers to the idea that small ethical compromises rarely lead to bigger ones.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'5. According to the UN, sustainable development must meet present needs without compromising future generations.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'6. Whistleblowing is a form of external disclosure used when employees have no control over executive-level decisions.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'7. The Circular Economy is designed to produce no waste and pollution by design.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'8. Kantian ethics suggests we should treat people as a "means to an end" rather than "ends in themselves."', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'9. The "Sleep Test" is a practical tool to check if a decision allows you to have peace of mind.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'10. Volkswagen was required to operate under a federal monitor from 2017 to 2020 to reform its culture.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'11. A person with an "analytical mind" deals primarily in risks to human life rather than probabilities.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'12. Rationalization is the mental trick of changing language to justify unethical behavior.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'13. Secondary stakeholders are those who have a direct financial contract with the company.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'14. Corporate Social Responsibility (CSR) often touches every part of a business, including the supply chain and HR.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'15. The "Grandma Test" involves asking what the legal consequences of an action would be.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'16. Success can paradoxically make a leader more susceptible to ethical failure.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'17. "Corporate Shared Value" (CSV) is essentially the same thing as philanthropy.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'18. The EPA alleged that Volkswagen cars emitted up to 40 times the legal amount of nitrogen oxide.', opts:['True','False'], answer:'True'},
      {section:"True/False", text:'19. Virtue Ethics is often criticized for being too rigid and rule-based.', opts:['True','False'], answer:'False'},
      {section:"True/False", text:'20. An ethical credo helps individuals resist pressure from an organization\'s culture.', opts:['True','False'], answer:'True'}
    ];

    const userAnswers = new Array(questions.length).fill(null);
    let current = 0;

    function renderQuestion(idx) {
      const q = questions[idx];
      document.getElementById('sectionBadge').textContent = q.section;
      document.getElementById('qText').textContent = q.text;
      const optsDiv = document.getElementById('qOpts');
      optsDiv.innerHTML = '';
      q.opts.forEach(function(opt, i) {
        const lbl = document.createElement('label');
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'q';
        radio.value = opt.charAt(0); // first character = A/B/C/D or T/F first letter... use full value for T/F
        // For T/F options the "value" is the whole text
        radio.value = opt;
        if (userAnswers[idx] === opt) {
          radio.checked = true;
          lbl.classList.add('selected');
        }
        radio.addEventListener('change', function() {
          userAnswers[idx] = opt;
          optsDiv.querySelectorAll('label').forEach(function(l){ l.classList.remove('selected'); });
          lbl.classList.add('selected');
        });
        lbl.appendChild(radio);
        lbl.appendChild(document.createTextNode(' ' + opt));
        optsDiv.appendChild(lbl);
      });

      const total = questions.length;
      document.getElementById('progressText').textContent = 'Question ' + (idx+1) + ' of ' + total;
      document.getElementById('sectionText').textContent = q.section + ' #' + (q.section==='MCQ' ? idx+1 : idx-19);
      document.getElementById('progressFill').style.width = ((idx+1)/total*100).toFixed(1) + '%';
      document.getElementById('prevBtn').disabled = idx === 0;
      const isLast = idx === total - 1;
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = isLast ? 'Submit Quiz' : 'Next →';
      nextBtn.className = isLast ? 'btn btn-primary' : 'btn btn-primary';
    }

    function go(dir) {
      const total = questions.length;
      if (dir === 1 && current === total - 1) {
        showResults();
        return;
      }
      current = Math.min(Math.max(current + dir, 0), total - 1);
      renderQuestion(current);
    }

    function showResults() {
      document.getElementById('quizScreen').style.display = 'none';
      const resultsDiv = document.getElementById('resultsScreen');
      resultsDiv.style.display = 'block';

      let score = 0;
      questions.forEach(function(q, i) {
        if (userAnswers[i] === q.answer) score++;
      });

      document.getElementById('scoreBig').textContent = score + ' / ' + questions.length;
      const pct = Math.round(score/questions.length*100);
      document.getElementById('scoreLabel').textContent = 'You answered ' + score + ' out of ' + questions.length + ' correctly (' + pct + '%).';

      // Build review
      const rev = document.getElementById('reviewSection');
      rev.innerHTML = '<h2>Answers Review</h2>';
      questions.forEach(function(q, i) {
        const ua = userAnswers[i];
        const correct = ua === q.answer;
        const div = document.createElement('div');
        div.className = 'review-q';
        const badge = '<span style="font-size:0.78rem;font-weight:700;text-transform:uppercase;background:rgba(184,146,42,0.12);color:#B8922A;border-radius:4px;padding:1px 7px;margin-right:6px;">' + q.section + '</span>';
        div.innerHTML = '<div class="rq-text">' + badge + q.text + '</div>'
          + '<div class="rq-row">'
          + '<span>Your answer: <span class="your-ans ' + (correct?'ok':'bad') + '">' + (ua || '(not answered)') + (correct ? ' ✓' : ' ✗') + '</span></span>'
          + (!correct ? '<span>Correct answer: <span class="correct-ans">' + q.answer + '</span></span>' : '')
          + '</div>';
        rev.appendChild(div);
      });
    }

    function restartQuiz() {
      userAnswers.fill(null);
      current = 0;
      document.getElementById('resultsScreen').style.display = 'none';
      document.getElementById('quizScreen').style.display = 'block';
      renderQuestion(0);
    }

    // Init
    renderQuestion(0);
  </script>
</body>
</html>
